
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM SOUL | Virtual Closet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        
        :root {
            --void: #051F20; --deep: #0B2B26; --forest: #163832;
            --moss: #235347; --mint: #8EB69B; --light: #DAF1DE;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--void);
            color: var(--light);
            overflow-x: hidden;
        }

        .unreal-card {
            background: linear-gradient(145deg, var(--deep), var(--void));
            border: 1px solid rgba(142, 182, 155, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .unreal-card:hover {
            border-color: var(--mint);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .active-tab {
            color: var(--light) !important;
            border-bottom: 2px solid var(--light);
        }

        .cart-sidebar {
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cart-open .cart-sidebar { transform: translateX(0); }
    </style>
</head>
<body class="selection:bg-[#8EB69B] selection:text-[#051F20]">

    <div id="cart" class="cart-sidebar fixed top-0 right-0 h-full w-full md:w-[400px] bg-[#0B2B26] z-[100] p-10 border-l border-[#235347]">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold uppercase tracking-widest">Your Bag</h2>
            <button onclick="toggleCart()" class="text-[#8EB69B] hover:text-white underline text-xs">CLOSE</button>
        </div>
        <div id="cart-items" class="space-y-6 opacity-50 text-center py-20">
            Your closet is currently empty.
        </div>
        <div class="absolute bottom-10 left-10 right-10">
            <button class="w-full py-4 bg-[#DAF1DE] text-[#051F20] font-black uppercase tracking-widest">Checkout</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 px-6 py-8 border-b border-[#235347]/30 backdrop-blur-2xl">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-6">
            <div class="text-3xl font-black tracking-tighter cursor-pointer" onclick="changeCategory('All Seasonal')">PHANTOM SOUL</div>
            
            <div class="flex flex-wrap gap-6 justify-center text-[11px] font-bold uppercase tracking-[0.2em] text-[#8EB69B]/60">
                <button onclick="changeCategory('Topwear', this)" class="nav-btn hover:text-white transition-all">Topwear</button>
                <button onclick="changeCategory('Bottomwear', this)" class="nav-btn hover:text-white transition-all">Bottomwear</button>
                <button onclick="changeCategory('Winter', this)" class="nav-btn hover:text-white transition-all">Winter</button>
                <button onclick="changeCategory('Male', this)" class="nav-btn hover:text-white transition-all">Male</button>
                <button onclick="changeCategory('Female', this)" class="nav-btn hover:text-white transition-all">Female</button>
                <button onclick="changeCategory('Kids', this)" class="nav-btn hover:text-white transition-all">Kids</button>
            </div>

            <div class="flex gap-6 items-center">
                <button onclick="toggleCart()" class="relative group">
                    <span class="text-[10px] font-bold tracking-widest group-hover:text-[#8EB69B] transition-colors">BAG (0)</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <section class="relative rounded-[40px] bg-[#0B2B26] p-10 md:p-20 overflow-hidden border border-[#163832]">
            <div class="grid lg:grid-cols-2 gap-16 items-center relative z-10">
                <div>
                    <h2 id="cat-title" class="text-8xl font-black tracking-tighter leading-none mb-6">NEW <br> DROPS</h2>
                    <p id="cat-desc" class="text-[#8EB69B] text-lg max-w-sm mb-10 opacity-80">Explore the latest technical silhouettes designed for high-performance daily wear.</p>
                    <div class="flex gap-4">
                        <button class="px-8 py-4 bg-[#DAF1DE] text-[#051F20] font-black rounded-xl hover:scale-105 transition-transform">SHOP NOW</button>
                    </div>
                </div>

                <div class="flex items-end gap-3 h-[350px]" id="closet-visual">
                    <div class="flex-1 bg-[#163832] rounded-2xl h-[40%] animate-pulse"></div>
                    <div class="flex-1 bg-[#235347] rounded-2xl h-[90%]"></div>
                    <div class="flex-1 bg-[#8EB69B] rounded-2xl h-[60%]"></div>
                    <div class="flex-1 bg-[#163832] rounded-2xl h-[75%]"></div>
                </div>
            </div>
            <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-[#8EB69B] opacity-10 blur-[120px]"></div>
        </section>

        <div class="mt-24">
            <div class="flex justify-between items-end mb-12">
                <h3 id="grid-label" class="text-4xl font-bold tracking-tight">FEATURED ITEMS</h3>
                <span class="text-[10px] tracking-[0.4em] text-[#8EB69B] uppercase font-bold">Scroll to explore</span>
            </div>
            
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                </div>
        </div>
    </main>

    <footer class="mt-40 py-20 border-t border-[#235347]/30 text-center">
        <p class="text-[10px] tracking-[0.8em] uppercase opacity-30">© 2026 Phantom Soul Studios</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Ethereal Shell", cat: "Topwear", price: "$120", color: "#163832" },
            { id: 2, name: "Void Cargo", cat: "Bottomwear", price: "$150", color: "#0B2B26" },
            { id: 3, name: "Thermal Knit", cat: "Winter", price: "$180", color: "#235347" },
            { id: 4, name: "Neural Tee", cat: "Male", price: "$65", color: "#163832" },
            { id: 5, name: "Ghost Dress", cat: "Female", price: "$210", color: "#8EB69B" },
            { id: 6, name: "Mini Phantom", cat: "Kids", price: "$45", color: "#235347" }
        ];

        function changeCategory(cat, btn) {
            // Update UI Styling
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            if(btn) btn.classList.add('active-tab');

            // Update Text
            document.getElementById('cat-title').innerHTML = `${cat.toUpperCase()}<br><span class="opacity-30">SERIES</span>`;
            document.getElementById('grid-label').innerText = `${cat} Collection`;

            // Animate Closet
            gsap.to(".flex-1", { height: () => Math.random() * 100 + "%", duration: 0.8, stagger: 0.1, ease: "power2.out" });

            // Filter Products
            const filtered = products.filter(p => p.cat === cat || cat === 'All Seasonal');
            renderProducts(filtered);
        }

        function renderProducts(items) {
            const container = document.getElementById('product-grid');
            container.innerHTML = items.map(p => `
                <div class="unreal-card p-6 rounded-3xl group cursor-pointer">
                    <div class="aspect-[4/5] w-full rounded-2xl mb-6 overflow-hidden flex items-center justify-center" style="background-color: ${p.color}">
                         <div class="w-1/2 h-1/2 bg-white/10 blur-2xl group-hover:scale-150 transition-transform"></div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-lg">${p.name}</h4>
                            <p class="text-xs text-[#8EB69B] uppercase tracking-widest">${p.cat}</p>
                        </div>
                        <span class="font-bold text-[#8EB69B]">${p.price}</span>
                    </div>
                </div>
            `).join('');

            gsap.from(".unreal-card", { opacity: 0, y: 30, duration: 0.6, stagger: 0.1 });
        }

        function toggleCart() {
            document.body.classList.toggle('cart-open');
        }

        // Initial Load
        window.onload = () => {
            renderProducts(products);
            gsap.from("nav", { y: -100, opacity: 0, duration: 1 });
        };
    </script>
</body>
</html>
